groups:
  - name: llm-bench
    rules:
      - alert: HighInferenceLatencyP95
        expr: histogram_quantile(0.95, sum(rate(llm_bench_inference_latency_seconds_bucket[5m])) by (le)) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p95 inference latency high"
