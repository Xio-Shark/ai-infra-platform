openapi: 3.0.3
info:
  title: AI Infra Platform API
  description: 面向 AI 训练、推理和压测任务的作业编排平台
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /healthz:
    get:
      summary: 健康检查
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /metrics:
    get:
      summary: Prometheus 指标
      responses:
        '200':
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string

  /jobs:
    post:
      summary: 创建任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobInput'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Validation error
    get:
      summary: 列出所有任务
      responses:
        '200':
          description: Job list (sorted by priority)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'

  /jobs/{id}:
    get:
      summary: 查询任务详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Not found

  /jobs/{id}/schedule:
    post:
      summary: 调度任务 (pending → scheduled)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job scheduled

  /jobs/{id}/run:
    post:
      summary: 调度并执行任务
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Execution'

  /jobs/{id}/retry:
    post:
      summary: 重试失败任务
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job re-queued

  /jobs/{id}/cancel:
    post:
      summary: 取消任务
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled

  /jobs/{id}/executions:
    get:
      summary: 查询执行记录
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Execution'

  /jobs/{id}/trace:
    get:
      summary: 查询 trace 时间线
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trace spans

  /dispatch/once:
    post:
      summary: 批量调度 pending 任务
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Dispatched executions

components:
  schemas:
    CreateJobInput:
      type: object
      required: [name, job_type, executor, command]
      properties:
        name:
          type: string
        job_type:
          type: string
          enum: [training, inference, benchmark]
        executor:
          type: string
          enum: [shell, k8s-dry-run, k8s-apply, http, benchmark]
        priority:
          type: integer
          default: 0
        model_version:
          type: string
        dataset_version:
          type: string
        image_tag:
          type: string
        resource_spec:
          $ref: '#/components/schemas/ResourceSpec'
        command:
          type: array
          items:
            type: string
        environment:
          type: object
          additionalProperties:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        max_retries:
          type: integer
          default: 0

    Job:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        job_type:
          type: string
        status:
          type: string
          enum: [pending, scheduled, running, succeeded, failed, retrying, cancelled]
        executor:
          type: string
        priority:
          type: integer
        model_version:
          type: string
        resource_spec:
          $ref: '#/components/schemas/ResourceSpec'
        max_retries:
          type: integer
        retry_count:
          type: integer
        trace_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Execution:
      type: object
      properties:
        id:
          type: string
        job_id:
          type: string
        attempt:
          type: integer
        status:
          type: string
          enum: [running, succeeded, failed]
        executor:
          type: string
        logs:
          type: string
        exit_code:
          type: integer
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    ResourceSpec:
      type: object
      properties:
        cpu:
          type: string
        memory:
          type: string
        gpu:
          type: integer
        gpu_memory:
          type: string
