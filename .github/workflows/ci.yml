name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Check coverage
        run: go tool cover -func=coverage.out

      - name: Build binaries
        run: |
          go build -o bin/api-server ./cmd/api-server
          go build -o bin/benchctl ./cmd/benchctl

      - name: Vet
        run: go vet ./...
