apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator-api
spec:
  selector:
    app: ai-orchestrator-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-orchestrator-api
  template:
    metadata:
      labels:
        app: ai-orchestrator-api
    spec:
      containers:
        - name: api
          image: ai-job-orchestrator-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: JOB_DB_DSN
              value: "file:/data/jobs.db?_pragma=busy_timeout(5000)&_pragma=journal_mode(WAL)"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
