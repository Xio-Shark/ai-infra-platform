apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-orchestrator-worker
  template:
    metadata:
      labels:
        app: ai-orchestrator-worker
    spec:
      containers:
        - name: worker
          image: ai-job-orchestrator-worker:latest
          env:
            - name: WORKER_EXECUTOR
              value: "shell"
