apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference-gateway
  labels:
    app: ai-inference-gateway
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-inference-gateway
  template:
    metadata:
      labels:
        app: ai-inference-gateway
        component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/gateway/health"
    spec:
      containers:
        - name: gateway
          image: ai-job-orchestrator:latest
          command: ["./bin/gateway"]
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: GATEWAY_LISTEN
              value: ":9090"
            - name: GATEWAY_DEFAULT_RPS
              value: "200"
            - name: GATEWAY_HEALTH_INTERVAL
              value: "10s"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /gateway/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /gateway/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-inference-gateway
  labels:
    app: ai-inference-gateway
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: ai-inference-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-inference-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-inference-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
