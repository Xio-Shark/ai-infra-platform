apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-job-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-job-worker
  template:
    metadata:
      labels:
        app: ai-job-worker
    spec:
      containers:
        - name: worker
          image: ai-job-orchestrator:latest
          command: ["./bin/worker", "examples/training_job.json"]
