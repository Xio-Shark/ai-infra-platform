services:
  api-server:
    image: golang:1.22
    working_dir: /workspace
    command: ["go", "run", "./cmd/api-server"]
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
