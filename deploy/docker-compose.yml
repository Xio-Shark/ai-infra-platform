services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - API_ADDR=:8080
      - STORE_BACKEND=memory
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/bin/gateway"]
    ports:
      - "8081:9090"
    environment:
      - GATEWAY_LISTEN=:9090
      - GATEWAY_BACKENDS_JSON=${GATEWAY_BACKENDS_JSON:-[]}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/gateway/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./deploy/grafana/dashboard.json:/var/lib/grafana/dashboards/ai-infra.json:ro
    depends_on:
      - prometheus
